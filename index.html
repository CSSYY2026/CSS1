<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Visual FX Gallery | 頂級視覺特效聖典</title>
    <style>
        /* --- 基礎變數與重設 --- */
        :root {
            --bg-color: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --glow-color: #00f2fe;
            --glow-secondary: #4facfe;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            padding: 4rem 2rem;
        }

        /* --- 標題區 (特效 1: 霓虹微光文字) --- */
        header {
            text-align: center;
            margin-bottom: 5rem;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fff 0%, var(--glow-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 242, 254, 0.3);
            margin-bottom: 1rem;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* --- 特效展示網格 --- */
        .gallery-grid {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2.5rem;
        }

        /* --- 基礎卡片外框 (通用外殼) --- */
        .fx-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 380px;
            position: relative;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .fx-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 242, 254, 0.4);
        }

        /* 互動實驗區 */
        .fx-stage {
            flex-grow: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        /* 卡片文字說明 */
        .fx-info {
            width: 100%;
            text-align: left;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 1rem;
        }

        .fx-info h3 {
            font-size: 1.1rem;
            margin-bottom: 0.3rem;
            color: #fff;
        }

        .fx-info p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* ==========================================
           核心特效庫 (你可以依此格式複製出 50 種)
           ========================================== */

        /* 特效 2: 賽博朋克流光按鈕 (Cyberpunk Glow Button) */
        .btn-glow {
            padding: 12px 28px;
            border: none;
            background: linear-gradient(135deg, var(--glow-secondary) 0%, var(--glow-color) 100%);
            color: #000;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
        }

        .btn-glow::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--glow-secondary) 0%, var(--glow-color) 100%);
            filter: blur(15px);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
            border-radius: 8px;
        }

        .btn-glow:hover {
            transform: scale(1.05);
        }

        .btn-glow:hover::after {
            opacity: 0.8;
        }

        /* 特效 3: 高級毛玻璃質感 (Glassmorphism) */
        .glass-sphere {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            position: relative;
        }
        /* 後方裝飾球，用來突顯毛玻璃的模糊效果 */
        .glass-bg-orb {
            position: absolute;
            width: 60px;
            height: 60px;
            background: coral;
            border-radius: 50%;
            z-index: -1;
            transform: translate(-30px, -20px);
            animation: float 4s ease-in-out infinite alternate;
        }

        /* 特效 4: 骨架屏閃爍載入 (Skeleton Wave) */
        .skeleton-card {
            width: 100%;
            max-width: 200px;
            height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }

        .skeleton-card::after {
            content: "";
            position: absolute;
            inset: 0;
            transform: translateX(-100%);
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.08),
                transparent
            );
            animation: shimmer 1.5s infinite;
        }

        /* --- 動畫 Keyframes --- */
        @keyframes float {
            0% { transform: translate(-30px, -20px); }
            100% { transform: translate(-20px, -10px); }
        }

        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }

    </style>
</head>
<body>

    <header>
        <h1>CSS VISUAL FX LAB</h1>
        <p>探索極致的網頁動畫、質感、光影與流體視覺回饋</p>
    </header>

    <main class="gallery-grid">

        <!-- 01. 霓虹流光按鈕 -->
        <div class="fx-card">
            <div class="fx-stage">
                <button class="btn-glow">Hover Me</button>
            </div>
            <div class="fx-info">
                <h3>01. Cyberpunk Glow</h3>
                <p>利用虛擬元素與濾鏡模糊（blur）實現的霓虹環境光回饋。</p>
            </div>
        </div>

        <!-- 02. 高級毛玻璃質感 -->
        <div class="fx-card">
            <div class="fx-stage">
                <div class="glass-bg-orb"></div>
                <div class="glass-sphere"></div>
            </div>
            <div class="fx-info">
                <h3>02. Glassmorphism</h3>
                <p>運用 backdrop-filter 實現的現代微透光磨砂玻璃質感。</p>
            </div>
        </div>

        <!-- 03. 骨架屏載入 -->
        <div class="fx-card">
            <div class="fx-stage">
                <div class="skeleton-card"></div>
            </div>
            <div class="fx-info">
                <h3>03. Shimmer Skeleton</h3>
                <p>利用線性漸層與位移動畫，創造極致流暢的加載流體反光。</p>
            </div>
        </div>

        <!-- 你可以複製下方這個空白模板，一路貼到 50 個 -->
        <!-- 
        <div class="fx-card">
            <div class="fx-stage">
                這裡放你的 CSS 特效 HTML
            </div>
            <div class="fx-info">
                <h3>04. 特效名稱</h3>
                <p>特效的簡短技術原理描述。</p>
            </div>
        </div> 
        -->

    </main>

</body>
</html>
